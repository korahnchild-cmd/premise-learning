<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PBS 학습법 · 결제하기</title>
<link rel="stylesheet" href="assets/tailwind-b.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  body{ font-family:"Pretendard","Inter",sans-serif; -webkit-font-smoothing:antialiased; letter-spacing:-.012em; background:#F5F6F4; color:#0A0E17; }
  h1,h2{ letter-spacing:-.03em; }
  ::selection{ background:rgba(10,102,255,.14); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:9999px; transition:transform .3s cubic-bezier(.16,1,.3,1), background .25s, border-color .25s, box-shadow .25s; }
  .btn-primary{ background:#0A66FF; color:#fff; box-shadow:0 4px 14px rgba(10,102,255,.28); }
  .btn-primary:hover{ background:#0857db; transform:translateY(-2px); }
  .btn-primary:disabled{ opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
  .card{ background:#fff; border:1px solid #ECEEF1; border-radius:1.5rem; }
  .seg{ cursor:pointer; transition:border-color .2s, background .2s, transform .15s; }
  .seg:hover{ transform:translateY(-1px); }
  .seg.sel{ border-color:#0A66FF; background:rgba(10,102,255,.05); }
  .pm{ cursor:pointer; transition:border-color .2s, background .2s; }
  .pm.sel{ border-color:#0A66FF; background:rgba(10,102,255,.05); }
  .step-done{ display:none; }
  .step-done.show{ display:block; animation:sfade .5s ease both; }
  @keyframes sfade{ from{opacity:0; transform:translateY(10px)} }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important} }
</style>
</head>
<body class="min-h-screen flex flex-col">

<div id="topnav"></div>
<script src="common.js"></script>
<script src="https://js.tosspayments.com/v2/standard"></script>
<script type="module" src="firebase-init.js"></script>

<main class="flex-1 px-5 py-10">
  <div class="max-w-lg mx-auto">

    <div id="formView">
      <div class="text-center mb-8">
        <p class="text-[11px] font-semibold tracking-[.2em] uppercase text-point mb-2">Checkout</p>
        <h1 class="text-[1.9rem] md:text-[2.2rem] font-extrabold leading-tight">바로 결제하고<br>오늘부터 시작하기</h1>
        <p class="mt-3 text-[14px] text-body">무료체험이 아니라, 지금 바로 유료로 시작하고 싶은 분들을 위한 페이지예요.</p>
      </div>

      <div class="card p-6 md:p-7 mb-4">
        <p class="text-[12px] font-semibold text-faint uppercase tracking-wide mb-3">플랜 선택</p>
        <div class="grid grid-cols-2 gap-3" id="planSel"></div>
      </div>

      <div class="card p-6 md:p-7 mb-4">
        <p class="text-[12px] font-semibold text-faint uppercase tracking-wide mb-3">결제 주기</p>
        <div class="grid grid-cols-2 gap-3" id="cycleSel"></div>
      </div>

      <div class="card p-6 md:p-7 mb-4">
        <p class="text-[12px] font-semibold text-faint uppercase tracking-wide mb-3">결제 수단</p>
        <div class="grid gap-2.5" id="methodSel"></div>
      </div>

      <div class="card p-6 md:p-7 mb-6 flex items-center justify-between">
        <div>
          <p class="text-[13px] text-faint">오늘 결제 금액</p>
          <p class="text-[1.6rem] font-extrabold text-ink mt-0.5" id="totalPrice">-</p>
        </div>
        <p class="text-[12px] text-faint text-right max-w-[160px]" id="totalSub"></p>
      </div>

      <button class="btn btn-primary w-full py-4 text-[15px] font-semibold" id="payBtn" onclick="pay()">결제하기</button>
      <p class="text-center text-[12px] text-faint mt-4">언제든 마이페이지에서 해지할 수 있어요. <a href="pricing.html" class="underline hover:text-ink">7일 무료체험으로 먼저 해볼까요? →</a></p>
    </div>

    <div id="doneView" class="step-done text-center">
      <div class="w-20 h-20 rounded-full bg-point/10 flex items-center justify-center mx-auto mb-6">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#0A66FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2 class="text-[1.9rem] font-extrabold">결제가 완료됐어요</h2>
      <p class="mt-3 text-[14px] text-body" id="doneSummary"></p>
      <div class="mt-8 flex flex-col items-center gap-3">
        <a href="onboarding.html" class="btn btn-primary text-[15px] font-semibold px-10 py-4">루카와 첫 사건 시작하기 →</a>
        <a href="mypage.html" class="text-[14px] text-body hover:text-ink transition font-medium">마이페이지에서 확인하기</a>
      </div>
    </div>

  </div>
</main>

<footer class="pt-16 pb-10 bg-night text-white/65 border-t border-white/10">
  <div class="max-w-6xl mx-auto px-5 md:px-8">
    <div class="pt-8 flex flex-col md:flex-row items-center justify-between gap-4">
      <p class="text-[12px] text-white/35">© 2026 PBS 학습법. All rights reserved.</p>
      <nav class="flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-[12px] text-white/45">
        <a href="terms.html" class="hover:text-white transition">이용약관</a>
        <a href="privacy.html" class="hover:text-white transition">개인정보처리방침</a>
      </nav>
    </div>
  </div>
</footer>

<script>
  const $ = id => document.getElementById(id);
  const TOSS_CLIENT_KEY = "test_ck_QbgMGZzorzvEvPWYjnPLrl5E1em4"; // API 개별 연동 키(공개 클라이언트 키)
  const PRICES = {
    basic:   { m6: 39000, m1: 49000, label:"베이직" },
    premium: { m6: 59000, m1: 74000, label:"프리미엄" }
  };
  const params = new URLSearchParams(location.search);
  let state = {
    plan: params.get("plan") === "premium" ? "premium" : "basic",
    cycle: params.get("cycle") === "m1" ? "m1" : "m6",
    method: "card"
  };
  // 파이널 스파크 건별 모드
  const ITEM = params.get("item") === "final-spark" ? "final-spark" : null;
  const FS_EXAM_ID = params.get("examId") || "generic";
  const FS_EXAM_NAME = params.get("examName") || "";

  function renderPlans(){
    const wrap = $("planSel"); wrap.innerHTML = "";
    Object.entries(PRICES).forEach(([key, v])=>{
      const el = document.createElement("div");
      el.className = "seg border border-line rounded-2xl px-4 py-4" + (state.plan===key ? " sel" : "");
      el.innerHTML = `<p class="text-[14px] font-bold text-ink">${v.label}</p><p class="text-[12px] text-faint mt-1">${v[state.cycle].toLocaleString()}원 / 월</p>`;
      el.onclick = ()=>{ state.plan = key; renderAll(); };
      wrap.appendChild(el);
    });
  }
  function renderCycle(){
    const wrap = $("cycleSel"); wrap.innerHTML = "";
    [["m6","6개월 코스","–20%"],["m1","월 단위","약정 없음"]].forEach(([key,label,tag])=>{
      const el = document.createElement("div");
      el.className = "seg border border-line rounded-2xl px-4 py-4" + (state.cycle===key ? " sel" : "");
      el.innerHTML = `<p class="text-[14px] font-bold text-ink">${label}</p><p class="text-[12px] text-faint mt-1">${tag}</p>`;
      el.onclick = ()=>{ state.cycle = key; renderAll(); };
      wrap.appendChild(el);
    });
  }
  function renderMethods(){
    // 월 구독(빌링)은 카드 자동결제만 지원 → m1이면 카드만 노출.
    const wrap = $("methodSel"); wrap.innerHTML = "";
    const all = [
      ["naverpay","네이버페이","#03C75A"],
      ["kakaopay","카카오페이","#FEE500"],
      ["card","신용·체크카드","#0A0E17"]
    ];
    if (state.cycle === "m1") state.method = "card";
    const list = state.cycle === "m1" ? all.filter(m=>m[0]==="card") : all;
    list.forEach(([key,label,color])=>{
      const el = document.createElement("div");
      el.className = "pm border border-line rounded-2xl px-4 py-3.5 flex items-center gap-3" + (state.method===key ? " sel" : "");
      el.innerHTML = `<span style="width:10px;height:10px;border-radius:9999px;background:${color};display:inline-block"></span><span class="text-[14px] font-semibold text-ink">${label}</span>`;
      el.onclick = ()=>{ state.method = key; renderAll(); };
      wrap.appendChild(el);
    });
    if (state.cycle === "m1"){
      const note = document.createElement("p");
      note.className = "text-[12px] text-faint mt-1";
      note.textContent = "월 정기결제는 카드 자동결제만 지원해요.";
      wrap.appendChild(note);
    }
  }
  function renderTotal(){
    if (ITEM === "final-spark"){
      $("totalPrice").textContent = "19,900원";
      $("totalSub").textContent = "이번 시험 · 파이널 스파크" + (FS_EXAM_NAME ? (" · " + FS_EXAM_NAME) : "");
      return;
    }
    const price = PRICES[state.plan][state.cycle];
    $("totalPrice").textContent = price.toLocaleString() + "원 / 월";
    $("totalSub").textContent = state.cycle === "m6"
      ? "6개월 코스 · 총 " + (price*6).toLocaleString() + "원"
      : "월 단위 결제 · 언제든 해지 가능";
  }
  function renderAll(){ renderPlans(); renderCycle(); renderMethods(); renderTotal(); }

  function waitFor(cond, ms){ return new Promise(res=>{ const t0=Date.now(); const iv=setInterval(()=>{ let ok=false; try{ok=cond();}catch(e){} if(ok||Date.now()-t0>ms){ clearInterval(iv); res(ok);} },150); }); }
  function currentUser(){ try{ return window.PremiseAuth && PremiseAuth.auth && PremiseAuth.auth.currentUser; }catch(e){ return null; } }
  function doneTitle(t){ const h=document.querySelector("#doneView h2"); if(h) h.textContent=t; }
  function showDone(msg){ $("doneSummary").textContent = msg || ""; $("formView").style.display="none"; $("doneView").classList.add("show"); }

  async function pay(){
    if (!window.PremiseStore || !PremiseStore.isLoggedIn()){
      const q = new URLSearchParams({ plan: state.plan, cycle: state.cycle }).toString();
      location.href = "login.html?next=" + encodeURIComponent("checkout.html?" + q) + "&mode=checkout";
      return;
    }
    const btn = $("payBtn"); btn.disabled = true; btn.textContent = "결제창 여는 중...";
    try {
      await waitFor(()=> window.PremiseBilling && window.TossPayments && currentUser(), 8000);
      if (!window.PremiseBilling || !window.TossPayments) throw new Error("결제 모듈 로드에 실패했어. 새로고침 후 다시 시도해줘.");
      const base = location.origin + "/checkout.html";

      // 파이널 스파크 건별 — 일회성 일반결제(구독 아님)
      if (ITEM === "final-spark"){
        const fsOrder = await PremiseBilling.createFinalSparkOrder(FS_EXAM_ID, FS_EXAM_NAME);
        const useEasyFs = state.method === "naverpay" || state.method === "kakaopay";
        const reqFs = {
          method: useEasyFs ? "EASY_PAY" : "CARD",
          amount: { value: fsOrder.amount, currency: "KRW" },
          orderId: fsOrder.orderId, orderName: fsOrder.orderName,
          successUrl: base + "?toss=payment", failUrl: base + "?toss=fail"
        };
        if (useEasyFs) reqFs.easyPay = { provider: state.method === "naverpay" ? "NAVERPAY" : "KAKAOPAY" };
        await TossPayments(TOSS_CLIENT_KEY).payment({ customerKey: TossPayments.ANONYMOUS }).requestPayment(reqFs);
        return;
      }

      const order = await PremiseBilling.createOrder(state.plan, state.cycle); // {orderId, amount, orderName, customerKey}
      const tp = TossPayments(TOSS_CLIENT_KEY);
      if (state.cycle === "m1"){
        // 월 구독: 자동결제(빌링) 카드 등록 — 카드만
        const payment = tp.payment({ customerKey: order.customerKey });
        await payment.requestBillingAuth({
          method: "CARD",
          successUrl: base + "?toss=billing&orderId=" + encodeURIComponent(order.orderId),
          failUrl: base + "?toss=fail"
        });
      } else {
        // 6개월 선불: 일반결제
        const useEasy = state.method === "naverpay" || state.method === "kakaopay";
        const payment = tp.payment({ customerKey: TossPayments.ANONYMOUS });
        const req = {
          method: useEasy ? "EASY_PAY" : "CARD",
          amount: { value: order.amount, currency: "KRW" },
          orderId: order.orderId, orderName: order.orderName,
          successUrl: base + "?toss=payment",
          failUrl: base + "?toss=fail"
        };
        if (useEasy) req.easyPay = { provider: state.method === "naverpay" ? "NAVERPAY" : "KAKAOPAY" };
        await payment.requestPayment(req);
      }
    } catch(e){
      btn.disabled = false; btn.textContent = "결제하기";
      alert((e && e.message) ? e.message : "결제를 시작하지 못했어. 잠시 후 다시 시도해줘.");
    }
  }

  // 토스 리다이렉트 복귀 처리
  async function handleReturn(){
    const toss = params.get("toss");
    if (!toss) return false;
    $("formView").style.display = "none";
    $("doneView").classList.add("show");
    if (toss === "fail"){
      doneTitle("결제가 취소됐어요");
      showDone(params.get("message") || "결제가 취소되었거나 실패했어요. 다시 시도해 주세요.");
      return true;
    }
    doneTitle("결제 확인 중...");
    showDone("잠시만 기다려 주세요.");
    const ready = await waitFor(()=> window.PremiseBilling && currentUser(), 9000);
    if (!ready){ doneTitle("결제 확인 실패"); showDone("로그인 세션 확인에 실패했어. 마이페이지에서 상태를 확인해줘."); return true; }
    try {
      if (toss === "payment"){
        await PremiseBilling.confirmPayment(params.get("paymentKey"), params.get("orderId"), Number(params.get("amount")));
        doneTitle("결제가 완료됐어요");
        showDone("유료 구독이 시작됐어요. 지금 바로 이어서 학습할 수 있어요.");
      } else if (toss === "billing"){
        await PremiseBilling.issueBillingKey(params.get("authKey"), params.get("customerKey"), params.get("orderId"));
        doneTitle("결제가 완료됐어요");
        showDone("월 구독이 시작됐어요. 카드가 안전하게 등록됐어요.");
      }
    } catch(e){
      doneTitle("결제 확인 실패");
      showDone((e && e.message) ? e.message : "결제 확인 중 문제가 생겼어. 마이페이지에서 상태를 확인해줘.");
    }
    return true;
  }

  (async function init(){
    const returned = await handleReturn();
    if (!returned){
      if (ITEM === "final-spark"){
        const pc = $("planSel").closest(".card"); if (pc) pc.style.display = "none";
        const cc = $("cycleSel").closest(".card"); if (cc) cc.style.display = "none";
        const h1 = document.querySelector("#formView h1"); if (h1) h1.innerHTML = "파이널 스파크<br>이번 시험만 건별로";
        const sub = document.querySelector("#formView h1 + p"); if (sub) sub.textContent = "베이직 회원이 필요한 시험에만 여는 마무리 세션이에요.";
        state.cycle = "m6"; // 결제수단 전체 노출(카드/네이버/카카오)
        renderMethods(); renderTotal();
      } else {
        renderAll();
      }
    }
    if (window.PremiseNav) PremiseNav.render("checkout");
  })();
</script>
</body>
</html>
