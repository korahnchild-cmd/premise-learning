<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PBS 학습법 · 가입 없이 3개 풀어보기</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script>
  tailwind.config = { theme: { extend: {
    colors: { ink:"#0A0E17", body:"#525A69", faint:"#9AA4B2", point:"#0A66FF", line:"#ECEEF1", soft:"#F5F6F4", panel:"#F2F4F1" },
    fontFamily: { sans:["Pretendard","Inter","sans-serif"] }, borderRadius:{ "4xl":"2rem","5xl":"2.5rem" },
  }}};
</script>
<style>
  body{ font-family:"Pretendard","Inter",sans-serif; -webkit-font-smoothing:antialiased; letter-spacing:-.012em; background:#F5F6F4; color:#0A0E17; }
  h1,h2{ letter-spacing:-.03em; }
  ::selection{ background:rgba(10,102,255,.14); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:9999px; transition:transform .35s cubic-bezier(.16,1,.3,1), background .3s, color .3s, border-color .3s, box-shadow .3s; }
  .btn-primary{ background:#0A66FF; color:#fff; box-shadow:0 4px 14px rgba(10,102,255,.28); } .btn-primary:hover{ background:#0857db; transform:translateY(-2px); }
  .btn-ghost{ background:#fff; color:#0A0E17; border:1px solid #DfE3E8; } .btn-ghost:hover{ border-color:#0A66FF; color:#0A66FF; }

  /* ===== KOZY ===== */
  .kozy{ display:inline-block; }
  .kozy svg{ width:100%; height:100%; overflow:visible; display:block; }
  .k-face{ fill:rgba(10,102,255,.10); transition:fill .3s; } .k-face.top{ fill:rgba(10,102,255,.16); } .k-face.right{ fill:rgba(10,102,255,.05); }
  .k-edge{ fill:none; stroke:#0A66FF; stroke-width:2.4; stroke-linejoin:round; stroke-linecap:round; }
  .k-core{ fill:#0A66FF; filter:drop-shadow(0 0 4px rgba(10,102,255,.85)); }
  .octa{ opacity:0; } .ring{ fill:none; stroke:#0A66FF; stroke-width:2; opacity:0; }
  .k-wrap{ transform-origin:50% 55%; } .k-turn{ transform-origin:50% 50%; }
  .st-idle .k-wrap{ animation:kfloat 4s ease-in-out infinite; } .st-idle .k-turn{ animation:kturn 6s ease-in-out infinite; } .st-idle .k-core{ animation:kpulse 2.4s ease-in-out infinite; }
  @keyframes kfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}} @keyframes kturn{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
  @keyframes kpulse{0%,100%{opacity:.75;transform:scale(1);transform-origin:50% 50%}50%{opacity:1;transform:scale(1.35)}}
  .st-scan .face-top{animation:kflick 1.4s ease-in-out infinite} .st-scan .face-left{animation:kflick 1.4s ease-in-out infinite .45s} .st-scan .face-right{animation:kflick 1.4s ease-in-out infinite .9s}
  @keyframes kflick{0%,100%{fill:rgba(10,102,255,.05)}50%{fill:rgba(10,102,255,.28)}}
  .st-scan .k-core{animation:kscan 1.4s ease-in-out infinite} @keyframes kscan{0%,100%{transform:translateX(-8px);opacity:.6}50%{transform:translateX(8px);opacity:1}}
  .st-discover .cube{animation:kcubeOut 1.8s ease-in-out infinite;transform-origin:50% 50%} .st-discover .octa{animation:koctaIn 1.8s ease-in-out infinite;transform-origin:50% 50%} .st-discover .ring{animation:kring 1.8s ease-out infinite;transform-origin:50% 50%}
  @keyframes kcubeOut{0%,100%{opacity:1;transform:scale(1) rotate(0)}45%{opacity:0;transform:scale(.5) rotate(60deg)}55%{opacity:0}}
  @keyframes koctaIn{0%,40%{opacity:0;transform:scale(.5) rotate(-60deg)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
  @keyframes kring{0%,40%{opacity:0;transform:scale(.4)}55%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.6)}}
  .st-octa .cube{opacity:0} .st-octa .octa{opacity:1} .st-octa .k-core{animation:kpulse 2s ease-in-out infinite}
  .st-praise .k-wrap{animation:kbounce .8s cubic-bezier(.3,1.5,.5,1) infinite} @keyframes kbounce{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-13px) scale(1.08)}55%{transform:translateY(0) scale(.96)}70%{transform:translateY(-4px)}100%{transform:translateY(0) scale(1)}}
  .st-praise .k-core{animation:ksparkle .8s ease-in-out infinite} @keyframes ksparkle{0%,100%{filter:drop-shadow(0 0 3px rgba(10,102,255,.6))}50%{filter:drop-shadow(0 0 12px rgba(10,102,255,1))}}

  .trigger{ position:relative; transition:color .4s, background .4s; border-radius:4px; padding:0 3px; }
  .trigger.glow{ color:#0A66FF; font-weight:800; background:rgba(10,102,255,.08); }
  .trigger.blast{ animation:blast .7s ease forwards } @keyframes blast{0%{transform:scale(1)}40%{transform:scale(1.25);color:#0A66FF}100%{transform:scale(0);opacity:0}}
  .opt{ text-align:left; width:100%; border:1px solid #E4E8EC; background:#fff; border-radius:1rem; padding:.85rem 1rem; font-size:15px; font-weight:600; color:#0A0E17; transition:border-color .25s, background .25s, transform .2s; cursor:pointer; }
  .opt:hover{ border-color:#0A66FF; transform:translateY(-1px); }
  .opt.ok{ border-color:#0A66FF; background:rgba(10,102,255,.06); }
  .opt.no{ border-color:#E4A0A0; background:rgba(220,80,80,.05); }
  .opt.dim{ opacity:.5; } .opt:disabled{ cursor:default; }
  .step{ display:none; } .step.show{ display:block; animation:sfade .5s ease both; }
  @keyframes sfade{ from{opacity:0; transform:translateY(14px)} }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important} }
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- top: progress + close -->
<header class="px-5 py-4">
  <div class="max-w-xl mx-auto flex items-center gap-4">
    <p class="text-[12px] font-semibold text-faint shrink-0">가입 없이 체험 중</p>
    <div class="flex-1 h-1.5 rounded-full bg-line overflow-hidden">
      <div id="prog" class="h-full bg-point rounded-full transition-all duration-500" style="width:8%"></div>
    </div>
    <a href="index.html" class="text-[13px] text-faint hover:text-ink transition shrink-0">닫기</a>
  </div>
</header>

<main class="flex-1 flex items-center justify-center px-5 pb-10">
  <div class="w-full max-w-xl">

    <!-- INTRO -->
    <section class="step show text-center" id="s-intro">
      <div class="kozy st-idle mx-auto mb-8" style="width:120px;height:120px" id="k-intro"></div>
      <h1 class="text-[1.9rem] md:text-[2.4rem] font-extrabold leading-tight">전제 3개, <span class="text-point">가입 없이</span> 풀어볼래?</h1>
      <p class="mt-5 text-[16px] text-body leading-relaxed max-w-md mx-auto">난 전제탐정 코지야. 당연해 보이는 문장 속에 숨은 전제를 찾아 깨는 게 우리가 할 일이야. 딱 3개만 같이 해보자.</p>
      <button class="btn btn-primary text-[15px] font-semibold px-10 py-4 mt-9" onclick="startCase(0)">시작하기</button>
    </section>

    <!-- CASE TEMPLATE (JS로 채움) -->
    <section class="step text-center" id="s-case">
      <div class="flex justify-center gap-1.5 mb-6" id="caseDots"></div>
      <div class="kozy st-idle mx-auto mb-6" style="width:96px;height:96px" id="k-case"></div>
      <p class="text-[12px] font-semibold text-point uppercase tracking-widest mb-2" id="caseLabel"></p>

      <div id="caseCard" class="bg-white border border-line rounded-4xl px-6 py-9 mt-2 relative">
        <p class="text-[11px] font-semibold tracking-widest uppercase text-faint mb-4">함께 풀어볼 사건</p>
        <p class="text-[20px] md:text-[23px] font-bold leading-relaxed" id="caseText"></p>
        <div id="caseStep" class="mt-6 text-left"></div>
      </div>

      <p class="mt-5 text-[15px] text-ink leading-relaxed" id="caseKozy"></p>
      <button id="caseBtn" class="btn btn-primary w-full py-3.5 text-[15px] font-semibold mt-5">계속</button>
    </section>

    <!-- DONE -->
    <section class="step text-center" id="s-done">
      <div class="kozy st-praise mx-auto mb-8" style="width:132px;height:132px" id="k-done"></div>
      <h2 class="text-[2rem] md:text-[2.5rem] font-extrabold leading-tight">전제 3개, <span class="text-point">완전 정복!</span></h2>
      <p class="mt-5 text-[16px] text-body leading-relaxed max-w-md mx-auto">방금 넌 입문부터 심화까지, 세 단계의 전제를 모두 폭파했어. 매일 이런 사건을 만나는 게 PBS 학습법이야.</p>
      <div class="mt-9 flex flex-col items-center gap-3">
        <a href="onboarding.html" class="btn btn-primary text-[15px] font-semibold px-10 py-4">무료 체험으로 진짜 시작하기 →</a>
        <a href="course.html" class="text-[14px] text-body hover:text-ink transition font-medium">먼저 코스 둘러보기</a>
      </div>
    </section>

  </div>
</main>

<script>
  function kozySVG(){ return `<svg viewBox="0 0 100 100" aria-label="코지"><g class="k-wrap"><g class="k-turn">
    <g class="cube">
      <polygon class="k-face top face-top" points="50,15 82,33 50,50 18,33"/>
      <polygon class="k-face right face-right" points="82,33 82,67 50,85 50,50"/>
      <polygon class="k-face left face-left" points="18,33 50,50 50,85 18,67"/>
      <polygon class="k-edge" points="50,15 82,33 82,67 50,85 18,67 18,33"/>
      <path class="k-edge" d="M50,50 L82,33 M50,50 L18,33 M50,50 L50,85"/>
    </g>
    <g class="octa">
      <polygon class="k-face top" points="50,10 86,50 50,50 14,50"/>
      <polygon class="k-face right" points="50,50 86,50 50,90"/>
      <polygon class="k-face left" points="50,50 50,90 14,50"/>
      <polygon class="k-edge" points="50,10 86,50 50,90 14,50"/>
      <path class="k-edge" d="M50,10 L50,90 M14,50 L86,50"/>
    </g>
    <circle class="ring" cx="50" cy="50" r="30"/><circle class="k-core" cx="50" cy="50" r="4.5"/>
  </g></g></svg>`; }
  ["k-intro","k-case","k-done"].forEach(id=>{ document.getElementById(id).innerHTML = kozySVG(); });

  const $ = id => document.getElementById(id);

  // 입문 → 기본 → 심화, 난이도 순으로 3개 (가입 없이 맛보기)
  const CASES = [
    {
      level:"입문 · 전제 알아차리기",
      text: `공부는 <span class="trigger" id="trig0">열심히</span> 해야 한다`,
      q: "이 문장이 당연하게 믿고 있는 건 뭘까?",
      opts: [
        { label:"많이 할수록 결과가 좋아진다", ok:true, fb:"정확해! '양이 곧 성과'라고 믿는 전제야." },
        { label:"공부는 원래 지루하다", ok:false, fb:"지루함 얘기가 아니야. '얼마나'에 주목해봐." },
        { label:"잘하는 사람은 원래 똑똑하다", ok:false, fb:"재능이 아니라 '노력의 양'이 핵심이야." },
      ],
      premise: "'열심히'만 하면 된다는 전제",
      reframe: "방향 없는 노력은 헛돈다 — '어떻게'를 먼저 물어야 한다",
    },
    {
      level:"기본 · 전제를 흔들어 생각 확장",
      text: `수학은 <span class="trigger" id="trig1">빨리 푸는</span> 과목이다`,
      q: "숨은 믿음을 골라봐",
      opts: [
        { label:"빠르면 잘하는 것이다", ok:true, fb:"정확해! 속도를 실력의 증거로 삼고 있어." },
        { label:"수학은 어렵다", ok:false, fb:"어렵다는 얘긴 없어. '빨리'에 집중해봐." },
        { label:"문제는 많이 풀어야 한다", ok:false, fb:"'양'이 아니라 '속도'를 실력으로 보는 게 핵심이야." },
      ],
      premise: "'빠름 = 잘함'이라는 전제",
      reframe: "깊이 이해하는 과목 — 느리게 판 한 문제가 열 문제를 연다",
    },
    {
      level:"심화 · 다층적 전제 분석·재구성",
      text: `경제 기사는 <span class="trigger" id="trig2">사실</span>을 전한다`,
      q: "이 문장이 당연하게 믿고 있는 건 뭘까?",
      opts: [
        { label:"기사는 있는 그대로를 전달한다", ok:true, fb:"맞아, '기사=객관적 사실'이라는 믿음이 숨어 있어." },
        { label:"경제는 어렵다", ok:false, fb:"어려움이 아니라 '기사가 곧 사실'이라는 점에 주목해봐." },
        { label:"기자는 전문가다", ok:false, fb:"전문성이 아니라 '보도=중립'이라는 전제가 핵심이야." },
      ],
      premise: "'기사 = 사실'이라는 전제",
      reframe: "기사의 프레임을 걷어내고 대안적 전제로 재구성한다",
    },
  ];

  let ci = 0;      // case index (0~2)
  let sub = 0;     // sub-step within a case: choice → reveal → blast → insight
  let answered = false;
  const SUBS = ["choice","reveal","blast","insight"];

  function setK(state){ $("k-case").className = "kozy mx-auto mb-6 "+state; $("k-case").style.width="96px"; $("k-case").style.height="96px"; }

  function startCase(idx){
    ci = idx; sub = 0; answered = false;
    $("s-intro").classList.remove("show");
    $("s-done").classList.remove("show");
    $("s-case").classList.add("show");
    renderCase();
  }

  function caseDots(){
    $("caseDots").innerHTML = CASES.map((_,k)=>`<span class="inline-block w-2.5 h-2.5 rounded-full ${k<ci?'bg-point':k===ci?'bg-point/50':'bg-line'}"></span>`).join("");
  }

  function renderCase(){
    const C = CASES[ci];
    caseDots();
    $("prog").style.width = Math.round(((ci + (sub+1)/4) / CASES.length) * 100) + "%";
    $("caseLabel").textContent = C.level;
    $("caseText").innerHTML = C.text;
    const trig = document.getElementById("trig"+ci);
    const area = $("caseStep"), btn = $("caseBtn");
    btn.style.display = "block"; btn.disabled = false; btn.textContent = "계속";
    let html = "";
    const st = SUBS[sub];

    if(st === "choice"){
      setK("st-idle"); answered = false; btn.disabled = true;
      $("caseKozy").textContent = "";
      html = `<p class="text-[13px] text-body mb-2.5">${C.q}</p><div class="space-y-2" id="copts"></div><p id="cfb" class="text-[14px] mt-3 leading-relaxed hidden"></p>`;
    } else if(st === "reveal"){
      setK("st-scan"); if(trig) trig.classList.add("glow");
      $("caseKozy").textContent = "바로 이게 숨은 전제야. 반짝이는 단어 보이지?";
      html = `<div class="rounded-2xl bg-soft border border-line p-4"><p class="text-[11px] font-semibold tracking-widest uppercase text-faint mb-1">숨은 전제</p><p class="text-[15px] font-semibold text-ink">${C.premise}</p></div>`;
    } else if(st === "blast"){
      setK("st-idle"); btn.style.display = "none";
      $("caseKozy").textContent = "이 전제를 폭파해볼까? 눌러봐!";
      html = `<button id="cblast" class="btn btn-primary w-full py-3.5 text-[15px] font-semibold">전제 폭파하기 💥</button>`;
    } else if(st === "insight"){
      setK("st-discover"); setTimeout(()=>setK("st-octa"),1800);
      $("caseKozy").textContent = "방향이 바뀌었지? 이게 바로 PBS 학습법이야.";
      html = `<div class="rounded-2xl bg-point/5 border border-point/25 p-4"><p class="text-[11px] font-semibold tracking-widest uppercase text-point mb-1">전제 폭파</p><p class="text-[15px] font-semibold text-ink">${C.reframe}</p></div>`;
      btn.textContent = (ci < CASES.length - 1) ? "다음 사건 →" : "결과 보기 →";
    }
    area.innerHTML = html;

    if(st === "choice"){
      const w = $("copts");
      C.opts.forEach((o, idx)=>{
        const b = document.createElement("button"); b.className = "opt"; b.textContent = o.label;
        b.addEventListener("click", ()=>{ if(answered) return; answered = true;
          document.querySelectorAll("#copts .opt").forEach((x,j)=>{ x.disabled = true; if(C.opts[j].ok) x.classList.add("ok"); else if(j===idx) x.classList.add("no"); else x.classList.add("dim"); });
          const fb = $("cfb"); fb.textContent = o.fb; fb.className = "text-[14px] mt-3 leading-relaxed "+(o.ok?"text-point":"text-body");
          setK("st-scan"); setTimeout(()=>setK("st-idle"),1200); btn.disabled = false;
        });
        w.appendChild(b);
      });
    }
    if(st === "blast"){
      $("cblast").addEventListener("click", ()=>{
        if(trig){ trig.classList.remove("glow"); trig.classList.add("blast"); }
        setK("st-discover");
        setTimeout(()=>{ sub++; renderCase(); }, 700);
      });
    }
  }

  $("caseBtn").addEventListener("click", ()=>{
    if(SUBS[sub] === "insight"){
      if(ci < CASES.length - 1){ startCase(ci+1); }
      else { $("s-case").classList.remove("show"); $("s-done").classList.add("show"); $("prog").style.width = "100%"; }
      return;
    }
    sub++; renderCase();
  });
</script>
</body>
</html>
