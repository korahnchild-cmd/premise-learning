<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PBS 학습법 · 로그인</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script>
  tailwind.config = { theme: { extend: {
    colors: { ink:"#0A0E17", body:"#525A69", faint:"#6B7688", point:"#0A66FF", line:"#ECEEF1", soft:"#F5F6F4", panel:"#F2F4F1", night:"#0A0E17" },
    fontFamily: { sans:["Pretendard","Inter","sans-serif"] }, borderRadius:{ "4xl":"2rem","5xl":"2.5rem" },
  }}};
</script>
<style>
  body{ font-family:"Pretendard","Inter",sans-serif; -webkit-font-smoothing:antialiased; letter-spacing:-.012em; background:#F5F6F4; color:#0A0E17; }
  h1,h2{ letter-spacing:-.03em; }
  ::selection{ background:rgba(10,102,255,.14); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:.65rem; border-radius:9999px; transition:transform .3s cubic-bezier(.16,1,.3,1), background .25s, border-color .25s, box-shadow .25s; }
  .btn:active{ transform:scale(.98); }
  .btn-google{ background:#fff; color:#0A0E17; border:1px solid #DFE3E8; box-shadow:0 2px 10px rgba(10,14,23,.05); }
  .btn-google:hover{ border-color:#0A66FF; transform:translateY(-1px); box-shadow:0 6px 16px rgba(10,14,23,.08); }
  .btn-kakao{ background:#FEE500; color:#191600; }
  .btn-kakao:hover{ transform:translateY(-1px); box-shadow:0 6px 16px rgba(254,229,0,.35); }
  .btn-naver{ background:#03C75A; color:#fff; }
  .btn-naver:hover{ transform:translateY(-1px); box-shadow:0 6px 16px rgba(3,199,90,.28); }
  .card{ background:#fff; border:1px solid #ECEEF1; border-radius:2rem; }
  .kozy{ display:inline-block; }
  .kozy svg{ width:100%; height:100%; overflow:visible; display:block; }
  .k-face{ fill:rgba(10,102,255,.10); } .k-face.top{ fill:rgba(10,102,255,.16); } .k-face.right{ fill:rgba(10,102,255,.05); }
  .k-edge{ fill:none; stroke:#0A66FF; stroke-width:2.4; stroke-linejoin:round; stroke-linecap:round; }
  .k-core{ fill:#0A66FF; filter:drop-shadow(0 0 4px rgba(10,102,255,.85)); }
  .k-wrap{ transform-origin:50% 55%; animation:kfloat 4s ease-in-out infinite; }
  @keyframes kfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .k-core{ animation:kpulse 2.4s ease-in-out infinite; }
  @keyframes kpulse{0%,100%{opacity:.75;transform:scale(1);transform-origin:50% 50%}50%{opacity:1;transform:scale(1.35)}}
  @media (prefers-reduced-motion:reduce){ *{animation:none!important} }
  .toast{ position:fixed; left:50%; bottom:28px; transform:translate(-50%,12px); opacity:0; pointer-events:none; transition:transform .35s cubic-bezier(.16,1,.3,1), opacity .35s; }
  .toast.show{ transform:translate(-50%,0); opacity:1; }
</style>
</head>
<body class="min-h-screen flex flex-col">

<header class="px-5 py-5">
  <div class="max-w-xl mx-auto">
    <a href="index.html" class="inline-flex items-center gap-2.5 font-bold text-[15px] text-ink">
      <svg width="26" height="26" viewBox="0 0 40 40" aria-label="PBS 학습법 로고">
        <defs><clipPath id="logoClip"><circle cx="20" cy="20" r="18"/></clipPath></defs>
        <circle cx="20" cy="20" r="18" fill="#0A66FF"/>
        <rect x="-8" y="17" width="56" height="6.5" fill="#0A0E17" transform="rotate(-34 20 20)" clip-path="url(#logoClip)"/>
      </svg>
      PBS 학습법
    </a>
  </div>
</header>

<main class="flex-1 flex items-center justify-center px-5 pb-16">
  <div class="w-full max-w-[420px]">
    <div class="text-center mb-8">
      <div class="kozy mx-auto mb-6" style="width:76px;height:76px" id="kIcon"></div>
      <h1 class="text-[1.7rem] md:text-[1.9rem] font-extrabold leading-tight" id="headline">로그인하고<br>루카를 만나자</h1>
      <p class="mt-3 text-[14px] text-body leading-relaxed" id="subline">7일 무료체험은 신용카드 없이, 로그인만 하면 바로 시작할 수 있어.</p>
    </div>

    <div class="card p-7 md:p-8">
      <div class="flex flex-col gap-3">
        <button class="btn btn-google w-full py-3.5 text-[14.5px] font-semibold" onclick="loginWith('google')">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.87 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.81.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.98v2.33A9 9 0 009 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 013.68 9c0-.59.1-1.17.27-1.7V4.97H.98A9 9 0 000 9c0 1.45.35 2.83.98 4.03l2.97-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 00.98 4.97l2.97 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
          구글로 계속하기
        </button>
        <button class="btn btn-kakao w-full py-3.5 text-[14.5px] font-semibold" onclick="loginWith('kakao')">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#191600" d="M9 2C4.86 2 1.5 4.71 1.5 8.06c0 2.14 1.4 4.02 3.5 5.1-.15.55-.55 2.02-.63 2.34-.1.4.15.4.32.29.13-.08 2.1-1.43 2.96-2.02.43.06.87.09 1.35.09 4.14 0 7.5-2.71 7.5-6.06S13.14 2 9 2z"/></svg>
          카카오로 계속하기
        </button>
        <button class="btn btn-naver w-full py-3.5 text-[14.5px] font-semibold" onclick="loginWith('naver')">
          <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#fff" d="M11.4 9.7L6.7 3H3v12h4.6V8.3L12.3 15H16V3h-4.6v6.7z"/></svg>
          네이버로 계속하기
        </button>
      </div>

      <p class="text-center text-[11.5px] text-faint mt-6 leading-relaxed">계속 진행하면 <a href="terms.html" class="underline hover:text-ink">이용약관</a> 및 <a href="privacy.html" class="underline hover:text-ink">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.</p>
    </div>

    <p class="text-center text-[13px] text-faint mt-6"><a href="pricing.html" class="hover:text-ink transition">← 요금 안내로 돌아가기</a></p>
  </div>
</main>

<div class="toast bg-ink text-white text-[13px] font-semibold px-5 py-3 rounded-full shadow-lg" id="toast"></div>

<script src="common.js"></script>
<script>
  function kozySVG(){ return `<svg viewBox="0 0 100 100" aria-label="루카"><g class="k-wrap">
    <polygon class="k-face top" points="50,15 82,33 50,50 18,33"/>
    <polygon class="k-face right" points="82,33 82,67 50,85 50,50"/>
    <polygon class="k-face left" points="18,33 50,50 50,85 18,67"/>
    <polygon class="k-edge" points="50,15 82,33 82,67 50,85 18,67 18,33"/>
    <path class="k-edge" d="M50,50 L82,33 M50,50 L18,33 M50,50 L50,85"/>
    <circle class="k-core" cx="50" cy="50" r="4.5"/>
  </g></svg>`; }
  document.getElementById("kIcon").innerHTML = kozySVG();

  // next: 로그인 후 이동할 페이지, mode: trial(무료체험) | checkout(바로결제) | plain
  const params = new URLSearchParams(location.search);
  const next = params.get("next") || "onboarding.html";
  const mode = params.get("mode") || "";

  if (mode === "checkout") {
    document.getElementById("headline").innerHTML = "로그인하고<br>결제를 계속하자";
    document.getElementById("subline").textContent = "선택한 플랜으로 바로 결제를 진행할게. 로그인만 하면 끝이야.";
  } else if (mode === "trial") {
    document.getElementById("headline").innerHTML = "로그인하고<br>7일 무료체험 시작";
    document.getElementById("subline").textContent = "신용카드 없이 바로 시작돼. 로그인은 체험 기록을 지켜주는 용도야.";
  }

  // 이미 로그인 상태면 바로 next로
  if (window.PremiseStore && PremiseStore.isLoggedIn()) {
    location.replace(next);
  }

  function loginWith(provider){
    PremiseStore.login(provider);
    const label = provider === "google" ? "구글" : provider === "kakao" ? "카카오" : "네이버";
    const t = document.getElementById("toast");
    t.textContent = label + " 계정으로 로그인했어";
    t.classList.add("show");
    setTimeout(()=>{ location.href = next; }, 550);
  }
</script>
</body>
</html>
