<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PBS 학습법 · 오늘의 사건 — 데일리 레슨</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script>
  tailwind.config = { theme: { extend: {
    colors: { ink:"#0A0E17", body:"#525A69", faint:"#6B7688", point:"#0A66FF", line:"#ECEEF1", soft:"#F5F6F4", panel:"#F2F4F1" },
    fontFamily: { sans:["Pretendard","Inter","sans-serif"] }, borderRadius:{ "4xl":"2rem","5xl":"2.5rem" },
  }}};
</script>
<style>
  body { font-family:"Pretendard","Inter",sans-serif; -webkit-font-smoothing:antialiased; letter-spacing:-.012em; background:#F5F6F4; color:#0A0E17; }
  h1,h2,h3 { letter-spacing:-.03em; }
  ::selection { background:rgba(10,102,255,.14); }
  .en{ font-family:"Inter","Pretendard",sans-serif; } .eyebrow{ letter-spacing:.2em; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:9999px; white-space:nowrap; transition:transform .35s cubic-bezier(.16,1,.3,1), background .3s, color .3s, border-color .3s, box-shadow .3s; }
  .btn-primary { background:#0A66FF; color:#fff; box-shadow:0 4px 14px rgba(10,102,255,.28); } .btn-primary:hover { background:#0857db; transform:translateY(-2px); }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-ghost { background:#fff; color:#0A0E17; border:1px solid #DfE3E8; } .btn-ghost:hover { border-color:#0A66FF; color:#0A66FF; }

  /* KOZY */
  .kozy{ display:inline-block; } .kozy svg{ width:100%; height:100%; overflow:visible; display:block; }
  .k-face{ fill:rgba(10,102,255,.10); transition:fill .3s; } .k-face.top{ fill:rgba(10,102,255,.16); } .k-face.right{ fill:rgba(10,102,255,.05); }
  .k-edge{ fill:none; stroke:#0A66FF; stroke-width:2.4; stroke-linejoin:round; stroke-linecap:round; }
  .k-core{ fill:#0A66FF; filter:drop-shadow(0 0 4px rgba(10,102,255,.85)); }
  .octa{ opacity:0; } .ring{ fill:none; stroke:#0A66FF; stroke-width:2; opacity:0; }
  .k-wrap{ transform-origin:50% 55%; } .k-turn{ transform-origin:50% 50%; }
  .st-idle .k-wrap{ animation:kfloat 4s ease-in-out infinite; } .st-idle .k-turn{ animation:kturn 6s ease-in-out infinite; } .st-idle .k-core{ animation:kpulse 2.4s ease-in-out infinite; }
  @keyframes kfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}} @keyframes kturn{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
  @keyframes kpulse{0%,100%{opacity:.75;transform:scale(1);transform-origin:50% 50%}50%{opacity:1;transform:scale(1.35)}}
  .st-scan .face-top{animation:kflick 1.4s infinite} .st-scan .face-left{animation:kflick 1.4s infinite .45s} .st-scan .face-right{animation:kflick 1.4s infinite .9s}
  @keyframes kflick{0%,100%{fill:rgba(10,102,255,.05)}50%{fill:rgba(10,102,255,.3)}}
  .st-scan .k-core{animation:kscan 1.4s infinite} @keyframes kscan{0%,100%{transform:translateX(-8px);opacity:.6}50%{transform:translateX(8px);opacity:1}}
  .st-discover .cube{animation:kout 1.8s ease-in-out infinite;transform-origin:50% 50%} .st-discover .octa{animation:koin 1.8s ease-in-out infinite;transform-origin:50% 50%} .st-discover .ring{animation:kr 1.8s ease-out infinite;transform-origin:50% 50%}
  @keyframes kout{0%,100%{opacity:1;transform:scale(1) rotate(0)}45%{opacity:0;transform:scale(.5) rotate(60deg)}55%{opacity:0}}
  @keyframes koin{0%,40%{opacity:0;transform:scale(.5) rotate(-60deg)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
  @keyframes kr{0%,40%{opacity:0;transform:scale(.4)}55%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.6)}}
  .st-octa .cube{opacity:0} .st-octa .octa{opacity:1} .st-octa .k-core{animation:kpulse 2s infinite}
  .st-praise .k-wrap{animation:kbounce .8s cubic-bezier(.3,1.5,.5,1) infinite} @keyframes kbounce{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-13px) scale(1.08)}55%{transform:translateY(0) scale(.96)}100%{transform:translateY(0) scale(1)}}
  .st-praise .k-core{animation:ksparkle .8s infinite} @keyframes ksparkle{0%,100%{filter:drop-shadow(0 0 3px rgba(10,102,255,.6))}50%{filter:drop-shadow(0 0 12px rgba(10,102,255,1))}}
  .st-blast .cube{animation:kblast 1s ease-in-out} @keyframes kblast{0%{transform:scale(1)}20%{transform:translateX(-4px) rotate(-4deg)}40%{transform:translateX(4px) rotate(4deg)}55%{transform:scale(1.25)}100%{transform:scale(1)}}

  .stepwrap{ opacity:0; transform:translateY(12px); transition:opacity .5s ease, transform .5s ease; }
  .stepwrap.in{ opacity:1; transform:none; }

  .opt{ text-align:left; width:100%; border:1px solid #E4E8EC; background:#fff; border-radius:1rem; padding:1rem 1.1rem; font-size:15px; font-weight:600; color:#0A0E17; transition:border-color .25s, background .25s, transform .2s; cursor:pointer; }
  .opt:hover{ border-color:#0A66FF; transform:translateY(-1px); }
  .opt.ok{ border-color:#0A66FF; background:rgba(10,102,255,.06); }
  .opt.no{ border-color:#E4A0A0; background:rgba(220,80,80,.05); }
  .opt.dim{ opacity:.5; }
  .opt:disabled{ cursor:default; }

  .trig{ position:relative; padding:0 3px; border-radius:5px; transition:color .5s, background .5s; }
  .trig.glow{ color:#0A66FF; background:rgba(10,102,255,.09); font-weight:800; }
  .trig.blast{ animation:tblast .7s ease forwards } @keyframes tblast{0%{transform:scale(1)}40%{transform:scale(1.3);color:#0A66FF}100%{transform:scale(0);opacity:0}}
  .shake{ animation:shk .5s ease } @keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .spark{ position:absolute; width:7px; height:7px; border-radius:2px; background:#0A66FF; opacity:0; }
  .badge-pop{ animation:bpop .8s cubic-bezier(.3,1.5,.5,1) forwards } @keyframes bpop{0%{transform:scale(0) rotate(-25deg);opacity:0}60%{transform:scale(1.15) rotate(6deg);opacity:1}100%{transform:scale(1) rotate(0)}}
  @media (prefers-reduced-motion:reduce){ *{animation:none!important} .stepwrap{transition:none} }
</style>
</head>
<body>

<div id="topnav"></div>
<script src="common.js"></script>

<main class="max-w-2xl mx-auto px-5 pt-5 pb-10">

  <!-- top: streak + step progress -->
  <div class="flex items-center gap-4">
    <a href="course.html" class="text-faint hover:text-ink transition shrink-0" aria-label="닫기">✕</a>
    <div class="flex-1 flex gap-1.5" id="dots"></div>
    <span class="inline-flex items-center gap-1.5 font-semibold text-ink text-[13px] shrink-0"><span>🔥</span><span id="streak">0</span></span>
  </div>

  <!-- 사건 label -->
  <div class="flex items-center justify-between mt-6 mb-4">
    <div class="flex items-center gap-2">
      <p class="en text-[11px] font-semibold eyebrow uppercase text-point" id="caseTag">Case 1</p>
      <span id="previewBadge" class="text-[10.5px] font-bold text-faint bg-soft border border-line rounded-full px-2 py-0.5" style="display:none">무료 체험판</span>
    </div>
    <p class="text-[12px] text-faint" id="caseCount">1 / 3</p>
  </div>

  <!-- material -->
  <div id="materialCard" class="bg-white border border-line rounded-4xl px-7 py-10 text-center shadow-[0_2px_10px_rgba(10,14,23,.04)] relative">
    <p class="text-[22px] md:text-[26px] font-bold text-ink leading-relaxed" id="material"></p>
  </div>

  <!-- kozy + bubble -->
  <div class="flex gap-3.5 mt-6 items-start">
    <div id="kozy" class="kozy st-idle shrink-0" style="width:54px;height:54px"></div>
    <div class="flex-1 bg-white border border-line rounded-2xl px-5 py-3.5"><p class="text-[12px] font-semibold text-point mb-0.5">루카</p><p class="text-[15px] text-ink leading-relaxed" id="kozyLine"></p></div>
  </div>

  <!-- step interaction area -->
  <div id="step" class="stepwrap mt-6"></div>

  <!-- continue -->
  <button id="cont" class="btn btn-primary w-full mt-6 py-3.5 text-[15px] font-semibold">계속</button>

  <!-- DONE -->
  <section id="doneScreen" class="hidden mt-6">
    <div class="bg-white border border-line rounded-4xl p-10 text-center">
      <div class="kozy st-praise inline-block mb-4" style="width:72px;height:72px" id="doneKozy"></div>
      <h2 class="text-[22px] font-extrabold text-ink">오늘의 사건 완료!</h2>
      <p class="mt-3 text-[15px] text-body leading-relaxed">세 개의 전제를 찾아 폭파했어, 파트너.<br>내일 또 새로운 사건을 들고 올게.</p>
      <div class="mt-6 inline-flex items-center gap-2 font-semibold text-ink"><span>🔥</span> <span id="streakFinal">0</span>일 연속</div>
      <div class="mt-6 flex justify-center gap-3">
        <a href="notebook.html" class="btn btn-ghost px-6 py-3 text-[14px] font-semibold">파트너 노트 보기</a>
        <button onclick="location.reload()" class="btn btn-primary px-6 py-3 text-[14px] font-semibold">다시 하기</button>
      </div>
    </div>
  </section>
</main>

<script>
  function kozySVG(){ return `<svg viewBox="0 0 100 100" aria-label="루카"><g class="k-wrap"><g class="k-turn">
    <g class="cube"><polygon class="k-face top face-top" points="50,15 82,33 50,50 18,33"/><polygon class="k-face right face-right" points="82,33 82,67 50,85 50,50"/><polygon class="k-face left face-left" points="18,33 50,50 50,85 18,67"/><polygon class="k-edge" points="50,15 82,33 82,67 50,85 18,67 18,33"/><path class="k-edge" d="M50,50 L82,33 M50,50 L18,33 M50,50 L50,85"/></g>
    <g class="octa"><polygon class="k-face top" points="50,10 86,50 50,50 14,50"/><polygon class="k-face right" points="50,50 86,50 50,90"/><polygon class="k-face left" points="50,50 50,90 14,50"/><polygon class="k-edge" points="50,10 86,50 50,90 14,50"/><path class="k-edge" d="M50,10 L50,90 M14,50 L86,50"/></g>
    <circle class="ring" cx="50" cy="50" r="30"/><circle class="k-core" cx="50" cy="50" r="4.5"/>
  </g></g></svg>`; }
  const $ = id => document.getElementById(id);
  $("kozy").innerHTML = kozySVG();
  $("doneKozy").innerHTML = kozySVG();
  function setKozy(s){ $("kozy").className = "kozy shrink-0 "+s; $("kozy").style.width="54px"; $("kozy").style.height="54px"; }

  // ===== LESSONS (다단계) =====
  const LESSON_SETS = {};
  LESSON_SETS["중등"] = [
    { missionId:"in-3", subject:"언어", tag:"Case 1 · 입문", badge:"🕵️", badgeName:"문장파트너 획득!", note:"'조차'가 심은 전제를 포착",
      material:'"너<span class="trig" data-t>조차</span> 그걸 몰랐어."', trigGlow:true,
      steps:[
        { t:"intro", kozy:"이 짧은 말, 그냥 지나치기엔 뭔가 수상해. 딱 한 단어가 몰래 일하고 있거든." },
        { t:"choice", kozy:"자, 첫 번째 질문. 이 문장에서 가장 '수상한' 단어는?",
          q:"몰래 전제를 심는 단어를 골라봐", opts:[
            { label:"너", ok:false, fb:"‘너’는 그냥 대상이야. 뭔가를 조용히 '심는' 단어를 다시 찾아볼까?" },
            { label:"조차", ok:true, fb:"딩동! '조차'가 조용히 전제를 심고 있어. 잘 찾았다, 파트너." },
            { label:"몰랐어", ok:false, fb:"몰랐다는 사실보다, 그걸 '어떻게' 말했는지가 핵심이야." },
          ] },
        { t:"reveal", kozy:"'조차'를 뜯어보면, 사실 두 개의 전제가 숨어 있어.", premise:"① 다른 사람들은 다 안다  ② 너는 당연히 알 거라 여겼다" },
        { t:"choice", kozy:"그럼 이 전제를 걷어내면, 이 말의 '진짜 내용'만 남아. 뭘까?",
          q:"전제를 뺀 사실만 고르면", opts:[
            { label:"나는 무능하다", ok:false, fb:"그건 전제가 만들어낸 '느낌'이지 사실이 아니야." },
            { label:"그냥 한 사람이 어떤 걸 몰랐다", ok:true, fb:"바로 그거야. 전제를 걷어내면 이 사실만 남아." },
            { label:"모두가 나를 무시한다", ok:false, fb:"'모두'라는 것도 '조차'가 심은 착각이야." },
          ] },
        { t:"blast", kozy:"이제 '조차'가 심은 전제를 폭파하자. 눌러봐!" },
        { t:"insight", kozy:"봤지? 전제를 걷어내면 남는 건 사실 하나뿐이야.", reframe:"'조차'가 심은 전제를 걷어내면 남는 건 '한 사람이 무언가를 몰랐다'는 사실뿐. 이 말은 너를 깎을 힘이 없어." },
        { t:"wrap" },
      ] },

    { missionId:"ba-1", subject:"수학", tag:"Case 2 · 기본", badge:"🐢", badgeName:"깊이파트너 획득!", note:"속도 대신 깊이로 전환",
      material:'"수학은 <span class="trig" data-t>빨리 푸는</span> 과목이다."', trigGlow:true,
      steps:[
        { t:"intro", kozy:"많은 친구가 이 말을 당연하게 여겨. 그런데 정말 그럴까?" },
        { t:"choice", kozy:"이 문장이 몰래 믿고 있는 게 뭘까?",
          q:"이 문장의 숨은 믿음을 골라봐", opts:[
            { label:"빠르면 잘하는 것이다", ok:true, fb:"정확해. 속도를 실력의 증거로 삼고 있어." },
            { label:"수학은 어렵다", ok:false, fb:"어렵다는 얘기는 여기 없어. '빨리'에 집중해봐." },
            { label:"문제는 많이 풀어야 한다", ok:false, fb:"'양'이 아니라 '속도'를 실력으로 보는 게 핵심이야." },
          ] },
        { t:"reveal", kozy:"그 믿음이 바로 이 전제야.", premise:"'빠름 = 잘함' — 속도를 실력의 증거로 삼는 전제" },
        { t:"choice", kozy:"그럼 이 전제가 왜 위험할까?",
          q:"이 전제의 함정을 골라봐", opts:[
            { label:"깊이 이해할 시간을 빼앗는다", ok:true, fb:"맞아. 빨리 넘기면 '왜'를 물을 틈이 없어져." },
            { label:"문제를 못 외우게 한다", ok:false, fb:"외우기가 목표가 아니야. 이해할 시간이 사라지는 게 문제지." },
            { label:"계산 실수를 늘린다", ok:false, fb:"실수는 결과일 뿐, 더 깊은 문제는 '이해의 부재'야." },
          ] },
        { t:"blast", kozy:"이 전제를 폭파해볼까? 눌러봐!" },
        { t:"insight", kozy:"방향이 바뀌었지?", reframe:"느리게 판 한 문제가 열 문제를 연다. 수학은 빨리 푸는 게 아니라 깊이 이해하는 과목이야." },
        { t:"wrap" },
      ] },

    { missionId:"ba-3", subject:"학습", tag:"Case 3 · 기본", badge:"💥", badgeName:"오답폭파파트너 획득!", note:"'틀리면 안 된다' 전제를 깨부숨",
      material:'"또 틀렸어. <span class="trig" data-t>난 안 되나 봐</span>."', trigGlow:true,
      steps:[
        { t:"intro", kozy:"이 말 속엔 슬픈 전제가 하나 숨어 있어. 같이 조심스럽게 꺼내보자." },
        { t:"choice", kozy:"이 친구는 '틀림'을 무엇과 곧바로 연결하고 있지?",
          q:"틀림과 이어붙인 것을 골라봐", opts:[
            { label:"재능 없음", ok:true, fb:"그래. '틀림'을 곧장 '재능 없음'으로 연결했어. 여기가 전제야." },
            { label:"노력 부족", ok:false, fb:"노력 얘기는 없어. '난 안 되나 봐'는 '재능'을 말하고 있어." },
            { label:"운이 나쁨", ok:false, fb:"운 얘기도 아니야. 스스로를 '안 되는 사람'으로 규정했지." },
          ] },
        { t:"reveal", kozy:"그 연결이 이렇게 한 줄로 이어진 전제야.", premise:"'틀림 = 실패 = 나는 재능이 없다' — 세 개가 한 줄로 이어진 전제" },
        { t:"choice", kozy:"그럼 오답을 다르게 보면, 오답은 뭐가 될 수 있을까?",
          q:"오답의 새로운 정체를 골라봐", opts:[
            { label:"다음을 여는 단서", ok:true, fb:"맞아! 틀린 이유를 알면 그게 가장 큰 힌트가 돼." },
            { label:"지워야 할 흔적", ok:false, fb:"지우면 단서도 사라져. 오답에 답으로 가는 길이 있어." },
            { label:"부끄러운 증거", ok:false, fb:"부끄러움은 전제가 만든 감정이야. 오답 자체는 재료일 뿐." },
          ] },
        { t:"blast", kozy:"'틀리면 안 된다'는 전제, 시원하게 폭파하자. 눌러봐!" },
        { t:"insight", kozy:"이제 오답이 무섭지 않지?", reframe:"오답은 실패가 아니라 '단서'야. 틀린 이유를 알아내는 순간, 그건 다음을 여는 자산이 돼." },
        { t:"wrap" },
      ] },
  ];

  LESSON_SETS["초등"] = [
    { missionId:"el-in-3", subject:"관계", tag:"Case 1 · 입문", badge:"🌧️", badgeName:"관점파트너 획득!", note:"'엄마 기분 = 내 탓' 전제를 알아차림",
      material:'"엄마가 아침부터 화나 있으면 <span class="trig" data-t>내 잘못</span>이야."', trigGlow:true,
      steps:[
        { t:"intro", kozy:"이 말, 마음이 콕 아프지? 근데 여기 몰래 숨은 생각이 하나 있어. 같이 찾아보자." },
        { t:"choice", kozy:"이 말은 엄마 기분을 무엇과 곧바로 이어붙였을까?",
          q:"엄마 기분과 이어붙인 걸 골라봐", opts:[
            { label:"내 탓", ok:true, fb:"맞아. 엄마 기분을 곧장 '내 탓'으로 이어붙였어. 여기가 숨은 생각이야." },
            { label:"날씨", ok:false, fb:"날씨 얘긴 없어. 이 말은 '나' 때문이라고 하고 있어." },

        ${qLoggedThisLesson ? `<div class="mt-3 flex items-center justify-center gap-1.5 text-[12.5px] text-body"><span>💬</span> 이번 주 리포트에 <b class="text-ink">네 질문</b>이 담겼어 — <a href="report.html" class="text-point font-semibold underline decoration-point/30 underline-offset-2">리포트에서 보기</a></div>` : ``}
      </div>`;
      cont.textContent = (li < LESSONS.length-1) ? "다음 사건 →" : "오늘의 사건 마치기";
    }

    area.innerHTML = html;
    requestAnimationFrame(()=>area.classList.add("in"));

    // wire choice
    if(S.t === "choice"){
      const wrap = $("opts");
      S.opts.forEach((o, idx)=>{
        const b = document.createElement("button");
        b.className = "opt"; b.textContent = o.label;
        b.addEventListener("click", ()=>{
          if(answered) return; answered = true;
          document.querySelectorAll("#opts .opt").forEach((x,j)=>{ x.disabled = true; if(S.opts[j].ok) x.classList.add("ok"); else if(j===idx) x.classList.add("no"); else x.classList.add("dim"); });
          const fb = $("fb"); fb.textContent = o.fb; fb.className = "text-[14px] mt-3 leading-relaxed "+(o.ok?"text-point":"text-body");
          setKozy("st-scan"); setTimeout(()=>setKozy("st-idle"), 1200);
          cont.disabled = false;
        });
        wrap.appendChild(b);
      });
    }
    // wire blast
    if(S.t === "blast"){
      $("blastBtn").addEventListener("click", ()=>{
        const trig = $("material").querySelector("[data-t]");
        $("materialCard").classList.add("shake"); setKozy("st-blast");
        if(trig){ spawnSparks(trig); trig.classList.remove("glow"); trig.classList.add("blast"); }
        setTimeout(()=>{ $("materialCard").classList.remove("shake"); si++; renderStep(); }, 750);
      });
    }
  }

  $("cont").addEventListener("click", ()=>{
    const L = LESSONS[li];
    if(L.steps[si].t === "wrap"){
      if(li < LESSONS.length-1){ li++; window.scrollTo({top:0,behavior:"smooth"}); loadLesson(); }
      else {
        $("streakFinal").textContent = PremiseStore.get().streak;
        ["materialCard","step","cont"].forEach(id=>{ $(id).style.display = "none"; });
        document.querySelectorAll("main .flex.gap-3\\.5").forEach(e=>e.style.display="none"); // kozy 말풍선 행
        $("doneScreen").classList.remove("hidden");
        window.scrollTo({top:0,behavior:"smooth"});
      }
      return;
    }
    // insight 단계를 떠날 때: 아이가 남긴 질문 한 줄을 기록 (선택)
    const cur = L.steps[si];
    if(cur && cur.t === "insight"){
      const qi = document.getElementById("qInput");
      if(qi && qi.value.trim() && window.PremiseStore && PremiseStore.logQuestion){ PremiseStore.logQuestion(L.subject, qi.value, L.note); qLoggedThisLesson = true; }
    }
    si++; renderStep();
  });

  function spawnSparks(el){
    const host = $("materialCard"), hr = host.getBoundingClientRect(), r = el.getBoundingClientRect();
    const cx = r.left - hr.left + r.width/2, cy = r.top - hr.top + r.height/2;
    for(let i=0;i<10;i++){ const s=document.createElement("span"); s.className="spark"; s.style.left=cx+"px"; s.style.top=cy+"px"; host.appendChild(s);
      const a=(Math.PI*2/10)*i, d=40+Math.random()*40, dx=Math.cos(a)*d, dy=Math.sin(a)*d;
      s.animate([{opacity:1,transform:"translate(0,0) scale(1)"},{opacity:0,transform:`translate(${dx}px,${dy}px) scale(.2)`}],{duration:600,easing:"cubic-bezier(.2,.8,.2,1)"});
      setTimeout(()=>s.remove(), 620);
    }
  }

  loadLesson();
  if(window.PremiseNav) PremiseNav.render("daily");
</script>
</body>
</html>
