<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PBS 학습법 · 고객센터 — 자주 묻는 질문</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script>
  tailwind.config = { theme: { extend: {
    colors: { ink:"#0A0E17", body:"#525A69", faint:"#9AA4B2", point:"#0A66FF", line:"#ECEEF1", soft:"#F5F6F4", panel:"#F2F4F1" },
    fontFamily: { sans:["Pretendard","Inter","sans-serif"] }, borderRadius:{ "4xl":"2rem","5xl":"2.5rem" },
  }}};
</script>
<style>
  body{ font-family:"Pretendard","Inter",sans-serif; -webkit-font-smoothing:antialiased; letter-spacing:-.012em; background:#F5F6F4; color:#0A0E17; }
  h1,h2{ letter-spacing:-.03em; }
  ::selection{ background:rgba(10,102,255,.14); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:9999px; transition:transform .35s cubic-bezier(.16,1,.3,1), background .3s, border-color .3s, color .3s; }
  .btn-primary{ background:#0A66FF; color:#fff; box-shadow:0 4px 14px rgba(10,102,255,.28); } .btn-primary:hover{ background:#0857db; transform:translateY(-2px); }
  .btn-ghost{ background:#fff; color:#0A0E17; border:1px solid #DfE3E8; } .btn-ghost:hover{ border-color:#0A66FF; color:#0A66FF; }
  .card{ background:#fff; border:1px solid #ECEEF1; border-radius:1.25rem; }

  /* kozy idle */
  .kozy svg{ width:100%; height:100%; overflow:visible; }
  .k-edge{ fill:none; stroke:#0A66FF; stroke-width:2.4; stroke-linejoin:round; stroke-linecap:round; }
  .k-face{ fill:rgba(10,102,255,.10); } .k-face.top{ fill:rgba(10,102,255,.16); }
  .k-core{ fill:#0A66FF; filter:drop-shadow(0 0 4px rgba(10,102,255,.85)); }
  .kozy .kw{ transform-origin:50% 55%; animation:kfloat 4s ease-in-out infinite; }
  @keyframes kfloat{ 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-6px) rotate(6deg)} }

  .acc-body{ max-height:0; overflow:hidden; opacity:0; transition:max-height .45s ease, opacity .45s ease; }
  .acc.open .acc-body{ opacity:1; }
  .acc-ic{ transition:transform .35s; } .acc.open .acc-ic{ transform:rotate(45deg); }
  mark{ background:rgba(10,102,255,.18); color:#0A0E17; border-radius:3px; padding:0 1px; }
  .catchip{ transition:all .25s; } .catchip.active{ background:#0A0E17; color:#fff; }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important} }
</style>
</head>
<body>

<!-- NAV (공통) -->
<div id="topnav"></div>
<script src="common.js"></script>

<main class="max-w-3xl mx-auto px-5 py-10">

  <!-- header + search -->
  <div class="text-center">
    <div class="kozy mx-auto mb-5" style="width:72px;height:72px">
      <svg viewBox="0 0 100 100" aria-label="코지"><g class="kw">
        <polygon class="k-face top" points="50,15 82,33 50,50 18,33"/><polygon class="k-face right" points="82,33 82,67 50,85 50,50"/><polygon class="k-face left" points="18,33 50,50 50,85 18,67"/>
        <polygon class="k-edge" points="50,15 82,33 82,67 50,85 18,67 18,33"/><path class="k-edge" d="M50,50 L82,33 M50,50 L18,33 M50,50 L50,85"/><circle class="k-core" cx="50" cy="50" r="4.5"/>
      </g></svg>
    </div>
    <h1 class="text-[2rem] md:text-[2.6rem] font-extrabold">무엇이든 물어보세요</h1>
    <p class="mt-3 text-[15px] text-body">코지가 자주 받는 질문을 정리해뒀어요. 검색해서 바로 찾아보세요.</p>

    <div class="relative mt-7 max-w-xl mx-auto">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-faint" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="search" type="text" placeholder="궁금한 내용을 검색해 보세요 (예: 환불, 몇 살, 효과)" class="w-full rounded-full border border-line bg-white pl-11 pr-4 py-3.5 text-[15px] outline-none focus:border-point transition" />
    </div>
  </div>

  <!-- category chips -->
  <div class="flex flex-wrap justify-center gap-2 mt-6" id="cats"></div>

  <!-- results -->
  <div class="mt-8 space-y-8" id="results"></div>

  <!-- empty state -->
  <div id="empty" class="hidden text-center py-16">
    <svg class="mx-auto mb-3" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#9AA4B2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <p class="text-[16px] font-semibold text-ink">검색 결과가 없어요</p>
    <p class="text-[14px] text-body mt-1">다른 단어로 검색하거나, 아래로 문의해 주세요.</p>
  </div>

  <!-- contact -->
  <div class="card p-8 mt-12 text-center">
    <h2 class="text-[1.4rem] font-extrabold">원하는 답을 못 찾으셨나요?</h2>
    <p class="mt-2 text-[14px] text-body">코지팀이 직접 도와드릴게요. 보통 하루 안에 답장이 와요.</p>
    <div class="flex flex-col sm:flex-row justify-center gap-3 mt-6">
      <a href="mailto:help@premise.learning" class="btn btn-primary px-7 py-3.5 text-[14px] font-semibold">이메일 문의</a>
      <a href="#" class="btn btn-ghost px-7 py-3.5 text-[14px] font-semibold">카카오톡 상담</a>
    </div>
  </div>

  <p class="text-center text-[12px] text-faint mt-8 pb-4">PBS 학습법 고객센터 · 평일 10:00–18:00</p>
</main>

<script>
  const FAQ = [
    { cat:"시작하기", q:"몇 세부터 시작할 수 있나요?", a:"10세부터 17세(초5–고2)까지를 위해 설계됐어요. 아이의 학년에 맞춰 사건의 난이도가 입문·핵심·심화로 자동 조정되니, 나이에 딱 맞는 전제부터 시작합니다." },
    { cat:"시작하기", q:"하루에 얼마나 걸리나요?", a:"짧은 몰입의 순간이면 충분해요. 등하교 길이나 잠들기 전 잠깐이면 돼요. 중요한 건 시간의 양이 아니라 매일 조금씩 생각하는 습관을 잇는 거예요." },
    { cat:"시작하기", q:"부모가 옆에서 봐줘야 하나요?", a:"아니요. 코지가 안내자 역할을 해서 아이 혼자서도 사건을 풀 수 있어요. 부모님은 주간 성장 리포트로 아이의 변화를 지켜보시면 됩니다." },
    { cat:"시작하기", q:"형제가 같이 써도 되나요?", a:"프로필을 나눠 각자의 탐정 노트와 진도를 따로 관리할 수 있어요. 아이마다 학년·과목 설정이 독립적으로 저장됩니다." },

    { cat:"학습 방법", q:"PBS 학습법이 정확히 뭔가요?", a:"문장과 지식 속에 숨은 '전제(당연하게 여기는 가정)'를 찾아 깨뜨리는 사고 훈련이에요. 전제 찾기 → 전제 폭파 → 탐정 노트, 이 세 단계를 매일 반복하며 스스로 질문하는 힘을 기릅니다." },
    { cat:"학습 방법", q:"다른 학습지·인강과 뭐가 다른가요?", a:"기존 학습이 '정답을 빨리 맞히는' 훈련이라면, PBS 학습법은 '문제를 의심하는' 훈련이에요. 지식을 늘리는 게 아니라, 지식을 대하는 태도 자체를 바꿉니다." },
    { cat:"학습 방법", q:"아이가 흥미를 잃으면 어쩌죠?", a:"미션 게임화로 지속적인 흥미를 유도해요. 전제탐정 코지가 매일 새로운 사건을 들고 오고, 배지와 연속 학습 기록으로 아이가 스스로 돌아오고 싶게 설계됐습니다." },
    { cat:"학습 방법", q:"정답이 없다는데 어떻게 배우나요?", a:"PBS 학습법은 정오를 채점하지 않아요. 대신 '다르게 본 시도'에 코지가 반응하고, 아이가 발견한 전제를 탐정 노트에 쌓아 태도의 성장을 보여줍니다." },

    { cat:"효과·성적", q:"성적이 정말 오르나요?", a:"단기 점수가 아니라 사고의 근본을 바꾸기 때문에, 서술형 논리 구성력이 근본적으로 향상돼요. 대부분의 학생이 3개월 차부터 질문의 질이 달라지고, 6개월 차에 유의미한 변화를 경험합니다." },
    { cat:"효과·성적", q:"효과를 어떻게 확인하나요?", a:"탐정 노트의 주간 리포트로 확인해요. 점수가 아니라 '질문의 질', '스스로 세운 계획 수', '다르게 시도한 횟수' 같은 태도 지표로 아이의 생각이 어떻게 자라는지 보여드립니다." },
    { cat:"효과·성적", q:"학교 서술형 시험에 도움이 되나요?", a:"네. 근거로 주장을 세우고 반론을 예상하는 훈련이 서술형의 핵심이에요. 전제를 의심하는 습관이 자리 잡으면 답안의 논리가 단단해집니다." },
    { cat:"효과·성적", q:"PBS 학습법은 검증된 방법인가요?", a:"‘전제 폭파’ 학습법은 인지과학 연구를 기반으로 설계하고 현직 교사들이 감수했어요. 적응형 전제 탐지 시스템은 특허 출원 중이며, PBS 학습법과 코지는 상표·저작권으로 보호됩니다. 유행이 아니라 검증된 사고 훈련 원리를 담았습니다." },

    { cat:"요금·결제", q:"무료 체험이 있나요?", a:"네, 신용카드 없이 7일 동안 무료로 체험할 수 있어요. 먼저 충분히 경험해 보고 결정하시면 됩니다." },
    { cat:"요금·결제", q:"요금제는 어떻게 되나요?", a:"베이직과 프리미엄 두 가지가 있어요. 6개월 약정 기준 각각 월 39,000원·59,000원이고, 약정 없이 월 단위로도 시작할 수 있습니다. 7일 무료 체험 후 선택하시면 돼요." },
    { cat:"요금·결제", q:"효과가 없으면 어쩌죠? 환불되나요?", a:"PBS 학습법은 단기 점수를 보장하지 않기 때문에, 결과를 조건으로 한 환불도 두지 않았어요. 대신 리스크를 세 가지로 줄였습니다 — ①7일 무료 체험으로 먼저 충분히 경험하고, ②약정에 가두지 않아 월 단위로 시작하고 언제든 1분이면 해지할 수 있으며, ③매주 성장 리포트로 아이의 변화를 투명하게 확인하실 수 있어요. 생각의 습관은 6개월에 걸쳐 자라기에, 저희는 '언제든 멈출 수 있는 자유'로 신뢰를 드립니다." },
    { cat:"요금·결제", q:"해지가 복잡하지 않나요?", a:"대시보드에서 1분이면 해지할 수 있어요. 전화 통화나 상담원 연결 없이 클릭 몇 번으로 끝납니다. 약정 없이 월 단위로 쓰다가 멈추셔도 됩니다." },

    { cat:"계정·기술", q:"어떤 기기에서 쓸 수 있나요?", a:"웹 브라우저와 모바일 모두 지원해요. 같은 계정으로 로그인하면 어느 기기에서든 탐정 노트와 진도가 이어집니다." },
    { cat:"계정·기술", q:"아이의 학습 기록은 안전한가요?", a:"학습 데이터는 아이의 성장 리포트를 위해서만 사용되고, 안전하게 보관돼요. 자세한 내용은 개인정보처리방침에서 확인하실 수 있습니다." },
    { cat:"계정·기술", q:"로그인은 어떻게 하나요?", a:"이메일 또는 소셜 계정으로 간편하게 로그인할 수 있어요. 아이 계정은 부모 계정에 연결해 함께 관리됩니다." },
  ];

  const cats = ["전체", ...Array.from(new Set(FAQ.map(f=>f.cat)))];
  let activeCat = "전체", query = "";
  const $ = id=>document.getElementById(id);

  // category chips
  const catWrap = $("cats");
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.className="catchip px-4 py-2 rounded-full border border-line text-[13px] font-semibold bg-white"+(c==="전체"?" active":"");
    b.textContent=c;
    b.onclick=()=>{ activeCat=c; document.querySelectorAll("#cats .catchip").forEach(x=>x.classList.remove("active")); b.classList.add("active"); render(); };
    catWrap.appendChild(b);
  });

  function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
  function hl(text){ if(!query) return text; const re=new RegExp("("+esc(query)+")","gi"); return text.replace(re,"<mark>$1</mark>"); }

  function render(){
    const q = query.trim().toLowerCase();
    let items = FAQ.filter(f=> (activeCat==="전체"||f.cat===activeCat) && (!q || (f.q+f.a).toLowerCase().includes(q)));
    const wrap = $("results"); wrap.innerHTML="";
    if(items.length===0){ $("empty").classList.remove("hidden"); return; }
    $("empty").classList.add("hidden");
    // group by cat
    const groups = {};
    items.forEach(f=>{ (groups[f.cat] = groups[f.cat]||[]).push(f); });
    Object.keys(groups).forEach(cat=>{
      const sec=document.createElement("div");
      sec.innerHTML=`<p class="text-[11px] font-semibold tracking-widest uppercase text-point mb-3">${cat}</p>`;
      const list=document.createElement("div"); list.className="space-y-2.5";
      groups[cat].forEach(f=>{
        const el=document.createElement("div");
        el.className="acc card overflow-hidden";
        el.innerHTML=`<button class="w-full flex items-center justify-between text-left px-5 py-4 gap-4">
            <span class="text-[15px] font-semibold text-ink">${hl(f.q)}</span>
            <span class="acc-ic text-point text-[22px] leading-none font-light shrink-0">+</span>
          </button>
          <div class="acc-body px-5"><p class="pb-5 text-[14px] text-body leading-relaxed">${hl(f.a)}</p></div>`;
        const body=el.querySelector(".acc-body");
        el.querySelector("button").onclick=()=>{
          const open=el.classList.contains("open");
          if(open){ el.classList.remove("open"); body.style.maxHeight=null; }
          else { el.classList.add("open"); body.style.maxHeight=body.scrollHeight+"px"; }
        };
        list.appendChild(el);
      });
      sec.appendChild(list); wrap.appendChild(sec);
    });
    // auto-open if searching and few results
    if(q && items.length<=3){ wrap.querySelectorAll(".acc").forEach(a=>{ a.classList.add("open"); a.querySelector(".acc-body").style.maxHeight=a.querySelector(".acc-body").scrollHeight+"px"; }); }
  }

  $("search").addEventListener("input", e=>{ query=e.target.value; render(); });

  render();
  if(window.PremiseNav) PremiseNav.render("faq");
</script>
</body>
</html>
